# Release pipeline: pushing a v* tag builds the one-click desktop installer per OS (Electron, via
# electron-builder) plus the standalone cross-compiled virtad binaries and first-party plugin zips,
# then drafts a GitHub Release with everything attached. Publishing the draft stays manual — the
# maintainer controls publication. Signing/notarization is still deferred.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # libfuse2 lets electron-builder's appimagetool run; the rest is plain Node/Go tooling.
      - name: Install AppImage tooling
        run: sudo apt-get update && sudo apt-get install -y libfuse2
      - name: Build AppImage (Electron) + cross-compiled virtad
        run: make app-appimage cross VERSION="$GITHUB_REF_NAME"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: |
            dist/*.AppImage
            dist/virtad-*

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build DMG (Electron)
        run: make app-dmg
      - uses: actions/upload-artifact@v4
        with:
          name: dist-macos
          path: dist/*.dmg

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # Windows runners have no make; run the equivalent of `make app-win` directly in bash.
      - name: Build Windows installer (Electron)
        shell: bash
        run: |
          (cd frontends/web && npm install && npm run build)
          find frontends/desktop/resources/web -mindepth 1 ! -name .gitkeep -delete
          cp -r frontends/web/dist/. frontends/desktop/resources/web/
          mkdir -p frontends/desktop/resources/bin frontends/desktop/build
          CGO_ENABLED=0 go build -ldflags "-s -w" -o frontends/desktop/resources/bin/virtad.exe ./cmd/virtad
          cp frontends/ui-kit/src/assets/virta-logo-512.png frontends/desktop/build/icon.png
          (cd frontends/desktop && npm install && npm run dist:win)
      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: dist/Virta-Setup.exe

  plugins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build plugin zips
        run: make build-plugins
      - uses: actions/upload-artifact@v4
        with:
          name: dist-plugins
          path: dist/*.zip

  release:
    needs: [linux, macos, windows, plugins]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      # electron-builder already emits stable filenames (Virta-Setup.exe, Virta.dmg,
      # Virta-x86_64.AppImage), which the homepage links to at releases/latest/download/<name>.
      - name: Draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --draft \
            --generate-notes
