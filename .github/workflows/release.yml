# Release pipeline: pushing a v* tag builds the
# one-click artifact per OS plus the standalone cross-compiled virtad binaries, then
# drafts a GitHub Release with everything attached. Publishing the draft stays manual —
# the maintainer controls publication. Signing/notarization is still deferred.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config libfuse2
          sudo curl -fsSL -o /usr/local/bin/appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          sudo chmod +x /usr/local/bin/appimagetool
      - name: Build AppImage + cross-compiled virtad
        run: make app-appimage cross VERSION="$GITHUB_REF_NAME"
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: |
            dist/*.AppImage
            dist/virtad-*

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install create-dmg and ImageMagick
        run: brew install create-dmg imagemagick
      - name: Generate app icons
        run: make icons
      - name: Build DMG
        run: make app-dmg VERSION="$GITHUB_REF_NAME"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-macos
          path: dist/*.dmg

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Generate app icon
        shell: bash
        run: |
          mkdir -p frontends/desktop/build
          magick assets/logo.png -define icon:auto-resize=256,128,64,48,32,16 frontends/desktop/build/appicon.ico
      # Inno Setup is preinstalled on GitHub-hosted Windows runners; the packaging
      # script adds its install dir to PATH.
      - name: Build Inno Setup installer
        shell: bash
        run: VERSION="$GITHUB_REF_NAME" bash scripts/package-windows.sh
      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: dist/VirtaSetup-*.exe

  plugins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build plugin zips
        run: make build-plugins
      - uses: actions/upload-artifact@v4
        with:
          name: dist-plugins
          path: dist/*.zip

  release:
    needs: [linux, macos, windows, plugins]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      # The homepage links to releases/latest/download/<name>, which needs version-stable
      # filenames; attach an alias per installer alongside the version-stamped originals.
      - name: Add stable-named aliases
        run: |
          cd dist
          cp VirtaSetup-v*.exe Virta-Setup.exe
          cp Virta-v*.dmg Virta.dmg
          cp Virta-v*.AppImage Virta-x86_64.AppImage
      - name: Draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --draft \
            --generate-notes
