# Runs the same `make ci` we run locally, across all three OSes.
name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Install CGO system headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
      # Windows runners lack `make` by default; the matrix's Linux/macOS legs cover the
      # gate. A Windows-native build step is added with the M4 packaging work.
      - name: make ci
        if: runner.os != 'Windows'
        run: make ci
      - name: go build (windows)
        if: runner.os == 'Windows'
        run: go build ./...

  # The Postgres store backend's full contract suite needs a real server, so it runs here
  # against a service container rather than in the offline `make ci` (where it skips).
  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: virta
          POSTGRES_DB: virta
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: store contract on Postgres
        env:
          VIRTA_TEST_POSTGRES: postgres://postgres:virta@127.0.0.1:5432/virta?sslmode=disable
        run: go test -race ./internal/store/postgres/...
