# Dormant until the repo is pushed (ADR-022: local-only development for now).
# When pushed, this runs the same `make ci` we run locally, across all three OSes.
name: ci

on:
  push:
  pull_request:

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.11.4
      # Windows runners lack `make` by default; the matrix's Linux/macOS legs cover the
      # gate. A Windows-native build step is added with the M4 packaging work.
      - name: make ci
        if: runner.os != 'Windows'
        run: make ci
      - name: go build (windows)
        if: runner.os == 'Windows'
        run: go build ./...
