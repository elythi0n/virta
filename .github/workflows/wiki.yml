name: publish-wiki

on:
  push:
    branches: [main]
    paths:
      - "wiki/**"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Publish wiki
        uses: actions/github-script@v7
        env:
          WIKI_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const { execSync } = require('child_process');
            const repo = context.repo;
            const wikiUrl = `https://x-access-token:${process.env.WIKI_TOKEN}@github.com/${repo.owner}/${repo.repo}.wiki.git`;

            execSync('git config --global user.email "actions@github.com"');
            execSync('git config --global user.name "GitHub Actions"');
            execSync(`git clone ${wikiUrl} /tmp/wiki`);
            execSync('cp -r wiki/. /tmp/wiki/');
            execSync('git -C /tmp/wiki add -A');

            try {
              execSync('git -C /tmp/wiki diff --cached --quiet');
              console.log('No wiki changes to publish.');
            } catch {
              execSync('git -C /tmp/wiki commit -m "sync wiki from main repo"');
              execSync(`git -C /tmp/wiki push ${wikiUrl}`);
              console.log('Wiki published.');
            }
