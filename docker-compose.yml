# Virta production stack — self-hosted deployment.
#
# Quickstart:
#   cp .env.example .env       # fill in VIRTA_TOKEN
#   docker compose up -d
#   open http://localhost:8344
#
# Single-user mode (default, VIRTA_HOSTED=0): one person's install with SQLite or Postgres.
# Hosted/multi-user mode (VIRTA_HOSTED=1): multiple users register accounts, each gets their
# own workspace. Requires Postgres.

services:
  virtad:
    build: .
    # image: ghcr.io/elythi0n/virta:latest
    restart: unless-stopped
    ports:
      - "8344:8344"
    depends_on:
      db:
        condition: service_healthy
    environment:
      VIRTA_ADDR:      "0.0.0.0:8344"
      VIRTA_TOKEN:     "${VIRTA_TOKEN:?set VIRTA_TOKEN to a long random secret}"
      VIRTA_STORAGE:   "postgres"
      VIRTA_DB_DSN:    "postgres://virta:${POSTGRES_PASSWORD:-virta}@db:5432/virta?sslmode=disable"
      # Set to 1 to enable multi-user account registration/login:
      VIRTA_HOSTED:    "${VIRTA_HOSTED:-0}"
      # Set to 1 to force-enable message logging (required for Ask AI history tools).
      VIRTA_LOGGING_ENABLED: "${VIRTA_LOGGING_ENABLED:-0}"
      # Optional: OAuth app credentials (users can also set them in Settings).
      VIRTA_TWITCH_CLIENT_ID:   "${VIRTA_TWITCH_CLIENT_ID:-}"
      VIRTA_KICK_CLIENT_ID:     "${VIRTA_KICK_CLIENT_ID:-}"
      VIRTA_KICK_CLIENT_SECRET: "${VIRTA_KICK_CLIENT_SECRET:-}"
      # Optional: public base URL at which the MCP server is reachable by external AI clients.
      # Set to e.g. "https://virta.example.com" in hosted deployments.
      # The Ask AI assistant will include this URL in responses about external client setup.
      VIRTA_MCP_RELAY_URL:      "${VIRTA_MCP_RELAY_URL:-}"
    volumes:
      - virta-data:/data
    healthcheck:
      test:     ["CMD", "/usr/local/bin/virtad", "version"]
      interval: 15s
      timeout:  5s
      retries:  3
      start_period: 10s

  # Postgres — required backend for hosted mode; also the recommended backend for single-user
  # server installs (more robust than SQLite for long-lived deployments).
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     virta
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-virta}"
      POSTGRES_DB:       virta
    volumes:
      - virta-db:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U virta"]
      interval: 5s
      timeout:  3s
      retries:  5

  # Meilisearch — optional. Enables typo-tolerant, faceted chat search.
  # Uncomment the block below, add "meilisearch" to virtad.depends_on, and set MEILI_MASTER_KEY.
  # meilisearch:
  #   image: getmeili/meilisearch:v1.8
  #   restart: unless-stopped
  #   environment:
  #     MEILI_MASTER_KEY:    "${MEILI_MASTER_KEY:?set a random key}"
  #     MEILI_NO_ANALYTICS:  "true"
  #   volumes:
  #     - virta-search:/meili_data
  #   healthcheck:
  #     test:     ["CMD", "wget", "-qO-", "http://localhost:7700/health"]
  #     interval: 10s
  #     retries:  5

  # Ollama — optional. Runs local AI (Ask pane) without an external API key.
  # Set OLLAMA_URL=http://ollama:11434 in .env (or in Settings → Intelligence) to use it.
  # GPU passthrough: add `deploy: resources: reservations: devices:` (see Ollama Docker docs).
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "0.0.0.0:11434:11434"
    volumes:
      - virta-ollama:/root/.ollama
    healthcheck:
      test:     ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 30s

volumes:
  virta-data:
  virta-db:
  # virta-search:
  virta-ollama:
