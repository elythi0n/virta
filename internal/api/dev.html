<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Virta — dev feed</title>
<style>
  :root { --twitch:#9146FF; --kick:#53FC18; --x:#e7e9ea; --bg:#0e0e10; --bg1:#18181b; --fg:#efeff1; --fg2:#adadb8; --line:#2a2a2e; }
  * { box-sizing:border-box; }
  body { margin:0; font:13px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; background:var(--bg); color:var(--fg); }
  header { display:flex; gap:.6rem; align-items:center; padding:.5rem .75rem; border-bottom:1px solid var(--line); background:var(--bg1); flex-wrap:wrap; position:sticky; top:0; }
  header b { color:#fff; letter-spacing:.02em; }
  select, input, button { font:inherit; background:#1f1f23; color:var(--fg); border:1px solid var(--line); border-radius:4px; padding:.25rem .5rem; }
  button { cursor:pointer; }
  button:hover { border-color:#3a3a40; }
  #status { margin-left:auto; color:var(--fg2); }
  #status .dot { display:inline-block; width:.6rem; height:.6rem; border-radius:50%; background:var(--fg2); margin-right:.3rem; vertical-align:middle; }
  #status.ok .dot { background:var(--kick); } #status.degraded .dot { background:#f5b942; } #status.down .dot { background:#f05c5c; }
  #channels { display:flex; gap:.4rem; padding:.4rem .75rem; flex-wrap:wrap; border-bottom:1px solid var(--line); }
  #channels:empty::before { content:"no channels — join one above"; color:var(--fg2); }
  .chip { display:inline-flex; gap:.4rem; align-items:center; background:#1f1f23; border:1px solid var(--line); border-radius:999px; padding:.15rem .5rem; }
  .chip .st { color:var(--fg2); font-size:11px; }
  .chip button { padding:0 .35rem; border:none; background:none; color:var(--fg2); }
  #feed { padding:.25rem 0 2rem; }
  .row { display:flex; gap:.5rem; padding:.1rem .75rem; align-items:baseline; }
  .row:hover { background:#141417; }
  .row .ts { color:var(--fg2); font-size:11px; min-width:4rem; }
  .row .plat { font-weight:700; }
  .row .author { font-weight:600; }
  .row .badges { color:var(--fg2); font-size:11px; }
  .row.deleted .body { text-decoration:line-through; color:var(--fg2); }
  .row.event { color:var(--fg2); font-style:italic; }
  .row.hidden { opacity:.4; }
  .row.hidden .author::after { content:" (hidden)"; color:var(--fg2); font-weight:400; font-size:11px; }
  .row.highlight { background:#2b2336; box-shadow:inset 3px 0 0 #f5b942; }
  .plat-twitch { color:var(--twitch); } .plat-kick { color:var(--kick); } .plat-x { color:var(--x); }
  .emote { color:#bf94ff; }
  .masked { color:#f05c5c; cursor:pointer; } .masked.revealed { color:var(--fg); }
  #statsbar { display:flex; gap:1rem; padding:.3rem .75rem; border-bottom:1px solid var(--line); color:var(--fg2); font-size:11px; flex-wrap:wrap; }
  #statsbar:empty { display:none; }
  #statsbar .stat b { color:var(--fg); font-weight:600; }
  #profile { display:inline-flex; gap:.3rem; align-items:center; }
  #compose, #auth { display:flex; gap:.5rem; align-items:center; padding:.4rem .75rem; border-bottom:1px solid var(--line); flex-wrap:wrap; }
  #targets { display:inline-flex; gap:.5rem; flex-wrap:wrap; }
  #targets label { color:var(--fg2); }
  #targets label.cantsend { opacity:.5; text-decoration:line-through; }
  #sendresult, #authinfo { color:var(--fg2); font-size:11px; }
  #auth a, #authinfo a { color:#bf94ff; }
  #queue { padding:.2rem .75rem; color:#f5b942; font-size:11px; }
  #queue:empty { display:none; }
  #queue b { color:#fff; }
</style>
</head>
<body>
<header>
  <b>Virta</b> <span class="plat-twitch">dev feed</span>
  <select id="platform"><option value="twitch">twitch</option><option value="kick">kick</option><option value="x">x</option></select>
  <input id="slug" placeholder="channel" size="14" autocomplete="off">
  <button id="join">Join</button>
  <span id="profile">profile <select id="profiles"></select></span>
  <span id="status"><span class="dot"></span><span id="statetext">connecting…</span></span>
</header>
<div id="channels"></div>
<div id="compose">
  <input id="msg" placeholder="message to send" size="40" autocomplete="off">
  <span id="targets"></span>
  <button id="send">Send</button>
  <span id="sendresult"></span>
</div>
<div id="auth">
  sign in:
  <button id="signin-twitch">Twitch</button>
  <button id="signin-kick">Kick</button>
  <span id="authinfo"></span>
</div>
<div id="queue"></div>
<div id="statsbar"></div>
<div id="feed"></div>
<script>
const token = new URLSearchParams(location.search).get('token') || '';
const platClass = p => 'plat-' + (p || '');
const MAX_ROWS = 500;
let lastSeq = 0;

function api(method, path, body) {
  return fetch(path, {
    method,
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });
}
function escapeHtml(s) { return (s || '').replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }

// --- channels ---
async function refreshChannels() {
  const r = await api('GET', '/v1/channels');
  if (!r.ok) return;
  const { channels } = await r.json();
  const el = document.getElementById('channels');
  el.innerHTML = '';
  (channels || []).forEach(c => {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.innerHTML = `<span class="${platClass(c.platform)}">${escapeHtml(c.platform)}</span> ${escapeHtml(c.slug)} `
      + `<span class="st">${escapeHtml(c.state)}${c.reason ? ' · ' + escapeHtml(c.reason) : ''}</span>`;
    const x = document.createElement('button');
    x.textContent = '✕'; x.title = 'leave';
    x.onclick = async () => {
      await api('DELETE', `/v1/channels?platform=${encodeURIComponent(c.platform)}&slug=${encodeURIComponent(c.slug)}`);
      refreshChannels();
    };
    chip.appendChild(x);
    el.appendChild(chip);
  });
  renderTargets(channels);
}
document.getElementById('join').onclick = async () => {
  const platform = document.getElementById('platform').value;
  const slug = document.getElementById('slug').value.trim();
  if (!slug) return;
  const r = await api('POST', '/v1/channels', { platform, slug, mode: 'anonymous' });
  if (!r.ok) { alert('join failed: ' + r.status + ' ' + (await r.text())); return; }
  document.getElementById('slug').value = '';
  refreshChannels();
};
document.getElementById('slug').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('join').click(); });

// --- feed ---
const feed = document.getElementById('feed');
function appendRow(row) {
  const atBottom = window.innerHeight + window.scrollY >= document.body.offsetHeight - 40;
  feed.appendChild(row);
  while (feed.childElementCount > MAX_ROWS) feed.removeChild(feed.firstChild);
  if (atBottom) window.scrollTo(0, document.body.scrollHeight);
}
function renderBody(segs) {
  return (segs || []).map(s => {
    if (s.kind === 'emote') return `<span class="emote">[${escapeHtml(s.text)}]</span>`;
    // Masked profanity: show the mask token; click to reveal the original (local feed only).
    if (s.kind === 'masked') return `<span class="masked" data-reveal="${escapeHtml(s.reveal || '')}">${escapeHtml(s.text)}</span>`;
    return escapeHtml(s.text);
  }).join('');
}
function tsOf(m) {
  const raw = (m.sent_at && !m.sent_at.startsWith('0001')) ? m.sent_at : m.received_at;
  const d = new Date(raw);
  return isNaN(d.getTime()) ? '' : d.toLocaleTimeString();
}
function addMessage(m) {
  const row = document.createElement('div');
  row.className = 'row';
  const ann = m.annotations || {};
  if (ann.first_time) row.classList.add('event'); // subtle styling cue for first-timers
  if (ann.highlight) row.classList.add('highlight');
  if (ann.hidden) row.classList.add('hidden');
  if (m.id) row.dataset.id = m.id;
  const badges = (m.author.badges || []).map(b => b.set).join(',');
  const ft = ann.first_time ? '★ ' : '';
  const color = (m.author.color || '').replace(/[^#0-9a-fA-F]/g, '');
  row.innerHTML = `<span class="ts">${tsOf(m)}</span>`
    + `<span class="plat ${platClass(m.platform)}">${escapeHtml(m.platform)}</span>`
    + `<span class="author"${color ? ` style="color:${color}"` : ''}>${ft}${escapeHtml(m.author.display_name || m.author.login)}</span>`
    + (badges ? `<span class="badges">[${escapeHtml(badges)}]</span>` : '')
    + `<span class="body">${renderBody(m.segments)}</span>`;
  appendRow(row);
}

// Click a masked span to reveal/hide the original (local feed only).
document.getElementById('feed').addEventListener('click', e => {
  const el = e.target.closest('.masked');
  if (!el) return;
  if (el.classList.toggle('revealed')) {
    el.dataset.masked = el.textContent;
    el.textContent = el.dataset.reveal;
  } else {
    el.textContent = el.dataset.masked;
  }
});
function addEvent(text, platform) {
  const row = document.createElement('div');
  row.className = 'row event';
  row.innerHTML = `<span class="ts"></span><span class="plat ${platClass(platform)}">${escapeHtml(platform || '')}</span>`
    + `<span class="body">${escapeHtml(text)}</span>`;
  appendRow(row);
}
function markDeleted(id) {
  if (!id) return;
  const r = feed.querySelector(`[data-id="${CSS.escape(id)}"]`);
  if (r) r.classList.add('deleted');
}

// --- connection state ---
function setStatus(state, reason) {
  const s = document.getElementById('status');
  s.className = state || '';
  document.getElementById('statetext').textContent = state + (reason ? ' · ' + reason : '');
}

// --- profiles ---
const profilesSel = document.getElementById('profiles');
async function refreshProfiles() {
  const r = await api('GET', '/v1/profiles');
  if (!r.ok) return;
  const { profiles } = await r.json();
  profilesSel.innerHTML = '';
  (profiles || []).forEach(p => {
    const o = document.createElement('option');
    o.value = p.id;
    o.textContent = p.name + (p.default ? ' (default)' : '');
    o.selected = p.active;
    profilesSel.appendChild(o);
  });
}
profilesSel.onchange = async () => {
  const id = profilesSel.value;
  if (!id) return;
  await api('POST', `/v1/profiles/${encodeURIComponent(id)}/activate`);
  // channels/feed update via the profile_changed event + refreshChannels below.
  refreshChannels();
};

// --- stats line ---
const statsByChannel = {}; // "platform:slug" → snapshot
function renderStats() {
  const bar = document.getElementById('statsbar');
  const keys = Object.keys(statsByChannel).sort();
  if (keys.length === 0) { bar.innerHTML = ''; return; }
  let totalRate = 0, totalUniq = 0;
  const parts = keys.map(k => {
    const s = statsByChannel[k];
    totalRate += s.messages_per_sec || 0;
    totalUniq += s.unique_chatters || 0;
    const top = (s.top_emotes || []).slice(0, 1).map(e => `${e.name}×${e.count}`).join('');
    return `<span class="stat">${escapeHtml(k)} <b>${(s.messages_per_sec || 0).toFixed(1)}</b>/s · <b>${s.unique_chatters || 0}</b> chatters${top ? ' · ' + escapeHtml(top) : ''}</span>`;
  });
  if (keys.length > 1) {
    parts.unshift(`<span class="stat">combined <b>${totalRate.toFixed(1)}</b>/s · <b>${totalUniq}</b> chatters</span>`);
  }
  bar.innerHTML = parts.join('');
}

// --- websocket ---
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/v1/stream?token=${encodeURIComponent(token)}`);
  ws.onopen = () => {
    setStatus('ok');
    ws.send(JSON.stringify({ action: 'subscribe', channels: [], since: lastSeq }));
    refreshChannels();
    refreshProfiles();
  };
  ws.onclose = () => { setStatus('down', 'disconnected'); setTimeout(connect, 1000); };
  ws.onmessage = ev => {
    const e = JSON.parse(ev.data);
    if (e.seq) lastSeq = Math.max(lastSeq, e.seq);
    switch (e.type) {
      case 'message': addMessage(e.message); break;
      case 'message_deleted': markDeleted(e.message_id); break;
      case 'channel_clear':
        addEvent(e.target_user_id ? 'cleared a user’s messages' : 'chat cleared', e.channel && e.channel.platform);
        break;
      case 'chat_settings': {
        const s = e.settings || {};
        const on = [];
        if (s.emote_only) on.push('emote-only');
        if (s.subs_only) on.push('subs-only');
        if (s.unique_chat) on.push('unique-chat');
        if (s.followers_only_minutes >= 0) on.push('followers-only');
        if (s.slow_seconds > 0) on.push('slow ' + s.slow_seconds + 's');
        addEvent('chat settings: ' + (on.join(', ') || 'all off'), e.channel && e.channel.platform);
        break;
      }
      case 'state':
        if (e.state) { setStatus(e.state.state, e.state.reason); refreshChannels(); }
        break;
      case 'stats':
        if (e.channel && e.stats) {
          statsByChannel[e.channel.platform + ':' + e.channel.slug] = e.stats;
          renderStats();
        }
        break;
      case 'profile_changed':
        addEvent('profile switched to ' + (e.profile_name || e.profile_id), '');
        refreshProfiles();
        refreshChannels();
        break;
    }
  };
}
// --- composer (send + target select) ---
async function renderTargets(channels) {
  const el = document.getElementById('targets');
  el.innerHTML = '';
  (channels || []).forEach(c => {
    const key = c.platform + ':' + c.slug;
    const label = document.createElement('label');
    label.innerHTML = `<input type="checkbox" value="${escapeHtml(key)}" checked> ${escapeHtml(c.slug)}`;
    el.appendChild(label);
  });
  // Dim targets that can't receive a send right now, with the reason as a tooltip.
  const keys = (channels || []).map(c => c.platform + ':' + c.slug);
  if (!keys.length) return;
  const r = await api('POST', '/v1/send/preview', { channels: keys });
  if (!r.ok) return;
  const { targets } = await r.json();
  (targets || []).forEach(t => {
    const cb = el.querySelector(`input[value="${CSS.escape(t.channel)}"]`);
    if (cb && !t.can_send) {
      cb.checked = false;
      const lbl = cb.closest('label');
      lbl.classList.add('cantsend');
      lbl.title = t.reason || 'cannot send';
    }
  });
}
async function doSend() {
  const text = document.getElementById('msg').value;
  const out = document.getElementById('sendresult');
  if (!text) return;
  const channels = [...document.querySelectorAll('#targets input:checked')].map(i => i.value);
  if (!channels.length) { out.textContent = 'no targets selected'; return; }
  const r = await api('POST', '/v1/send', { channels, text });
  if (!r.ok) { out.textContent = 'send failed: ' + r.status + ' ' + (await r.text()); return; }
  const { results } = await r.json();
  out.textContent = (results || []).map(x => `${x.channel}: ${x.status}${x.reason ? ' (' + x.reason + ')' : ''}`).join('   ');
  document.getElementById('msg').value = '';
}
document.getElementById('send').onclick = doSend;
document.getElementById('msg').addEventListener('keydown', e => { if (e.key === 'Enter') doSend(); });

// --- sign-in (Twitch device code, Kick redirect) ---
const authInfo = document.getElementById('authinfo');
let twPoll = null, kkPoll = null;
document.getElementById('signin-twitch').onclick = async () => {
  const r = await api('POST', '/v1/auth/twitch/device');
  if (!r.ok) { authInfo.textContent = 'Twitch sign-in unavailable: ' + (await r.text()); return; }
  const s = await r.json();
  authInfo.innerHTML = `Twitch: open <a href="${escapeHtml(s.verification_uri)}" target="_blank" rel="noopener">${escapeHtml(s.verification_uri)}</a> and enter <b>${escapeHtml(s.user_code)}</b>`;
  clearInterval(twPoll);
  twPoll = setInterval(async () => {
    const sr = await api('GET', '/v1/auth/twitch/device/' + encodeURIComponent(s.id));
    if (!sr.ok) return;
    const st = await sr.json();
    if (st.state === 'authorized') { authInfo.innerHTML = 'Twitch: signed in as <b>' + escapeHtml(st.login) + '</b>'; clearInterval(twPoll); refreshChannels(); }
    else if (['denied', 'expired', 'error'].includes(st.state)) { authInfo.textContent = 'Twitch: ' + st.state + (st.error ? ' · ' + st.error : ''); clearInterval(twPoll); }
  }, Math.max(1, s.interval || 5) * 1000);
};
document.getElementById('signin-kick').onclick = async () => {
  const r = await api('POST', '/v1/auth/kick/start');
  if (!r.ok) { authInfo.textContent = 'Kick sign-in unavailable: ' + (await r.text()); return; }
  const s = await r.json();
  authInfo.innerHTML = `Kick: open <a href="${escapeHtml(s.authorize_url)}" target="_blank" rel="noopener">authorize</a>, then return here`;
  clearInterval(kkPoll);
  kkPoll = setInterval(async () => {
    const sr = await api('GET', '/v1/auth/kick/' + encodeURIComponent(s.id));
    if (!sr.ok) return;
    const st = await sr.json();
    if (st.state === 'authorized') { authInfo.innerHTML = 'Kick: signed in as <b>' + escapeHtml(st.login) + '</b>'; clearInterval(kkPoll); refreshChannels(); }
    else if (['error', 'expired'].includes(st.state)) { authInfo.textContent = 'Kick: ' + st.state + (st.error ? ' · ' + st.error : ''); clearInterval(kkPoll); }
  }, 2000);
};

// --- send-queue depth + countdown ---
async function pollQueue() {
  const keys = [...document.querySelectorAll('#targets input')].map(i => i.value);
  const q = document.getElementById('queue');
  if (!keys.length) { q.innerHTML = ''; return; }
  const r = await api('POST', '/v1/send/queue', { channels: keys });
  if (!r.ok) return;
  const { queue } = await r.json();
  const active = (queue || []).filter(x => x.queued > 0 || x.next_in_ms > 0);
  q.innerHTML = active.length
    ? 'queue: ' + active.map(x => `${escapeHtml(x.channel)} <b>${x.queued}</b> queued${x.next_in_ms > 0 ? ' · next ' + (x.next_in_ms / 1000).toFixed(1) + 's' : ''}`).join('   ')
    : '';
}
setInterval(pollQueue, 1000);

connect();
</script>
</body>
</html>
