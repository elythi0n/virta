# golangci-lint v2 config. Enforces the architecture's two hard rules:
#  - depguard: implementations are imported only from internal/app
#  - forbidigo: no time.Now()/rand outside the injected clock (determinism)
version: "2"

run:
  timeout: 5m

linters:
  # standard = errcheck, govet, ineffassign, staticcheck, unused (covers substantive
  # correctness/style). The two rules below are the architecture's hard constraints.
  # (revive is intentionally omitted: its "exported"/"unused-parameter" rules nag about
  # doc comments on interface-implementing methods and unused callback params — noise the
  # port files already address by hand; staticcheck covers the substance.)
  default: standard
  enable:
    - depguard
    - forbidigo
    - bodyclose
    - misspell
  settings:
    depguard:
      rules:
        # Only internal/app (the wiring) may import implementation packages.
        # Ports (e.g. internal/platform) stay importable; their impl subpackages do not.
        implementations-wired-only:
          list-mode: lax
          files:
            - "!**/internal/app/**"
            - "!**/internal/plugin/markets/**"
            - "!**/*_test.go"
          deny:
            - pkg: github.com/elythi0n/virta/internal/platform/twitch
              desc: "import platform implementations only from internal/app"
            - pkg: github.com/elythi0n/virta/internal/platform/kick
              desc: "import platform implementations only from internal/app"
            - pkg: github.com/elythi0n/virta/internal/platform/youtube
              desc: "import platform implementations only from internal/app"
            - pkg: github.com/elythi0n/virta/internal/platform/x
              desc: "import platform implementations only from internal/app"
            - pkg: github.com/elythi0n/virta/internal/store/sqlite
              desc: "import store implementations only from internal/app"
            - pkg: github.com/elythi0n/virta/internal/store/postgres
              desc: "import store implementations only from internal/app"
            - pkg: github.com/elythi0n/virta/internal/secrets/keychain
              desc: "import secrets implementations only from internal/app"
            - pkg: github.com/elythi0n/virta/internal/search/meilisearch
              desc: "import search implementations only from internal/app"
            - pkg: github.com/elythi0n/virta/internal/search/noop
              desc: "import search implementations only from internal/app"
            - pkg: github.com/elythi0n/virta/internal/llm/anthropic
              desc: "import llm implementations only from internal/app"
            - pkg: github.com/elythi0n/virta/internal/llm/openaicompat
              desc: "import llm implementations only from internal/app"
            - pkg: github.com/elythi0n/virta/internal/plugin/host
              desc: "import plugin implementations only from internal/app"
            - pkg: github.com/elythi0n/virta/internal/plugin/source
              desc: "import plugin implementations only from internal/app"
            - pkg: github.com/elythi0n/virta/internal/plugin/markets
              desc: "import plugin implementations only from internal/app"
    forbidigo:
      forbid:
        - pattern: '^time\.Now$'
          msg: "use the injected clock (internal/clock) — tests must be deterministic"
        - pattern: '^time\.Since$'
          msg: "use the injected clock (internal/clock) — tests must be deterministic"
        - pattern: '^time\.Until$'
          msg: "use the injected clock (internal/clock) — tests must be deterministic"
        - pattern: '^rand\.'
          msg: "inject randomness; do not call package-level rand — tests must be deterministic"
  exclusions:
    rules:
      # The clock package is the one place allowed to read the real time.
      - path: 'internal/clock/'
        linters:
          - forbidigo
      # The id package is the one place allowed to read randomness (ULID entropy).
      - path: 'internal/id/'
        linters:
          - forbidigo
      # The file vault reads randomness for its encryption key and nonces.
      - path: 'internal/secrets/filevault/'
        linters:
          - forbidigo
      # The API/transport layer mints a random auth token and uses real-time deadlines;
      # the determinism rule targets the business/engine path, not transport glue.
      - path: 'internal/api/'
        linters:
          - forbidigo
      # Tests may use time/rand freely.
      - path: '_test\.go'
        linters:
          - forbidigo
      # Hosted auth uses crypto/rand for session tokens — security-critical, not mocked.
      - path: 'internal/hosted/'
        linters:
          - forbidigo
      # Crash reporter captures real wall-clock timestamps by definition.
      - path: 'internal/crash/'
        linters:
          - forbidigo
      # Webhook delivery uses real-time jitter for retry backoff.
      - path: 'internal/webhook/'
        linters:
          - forbidigo
      # LLM registry and meter use real time for cache-staleness and rate-limit windows.
      - path: 'internal/llm/'
        linters:
          - forbidigo
      # Wordlist loader uses real time for disk cache TTL (file mod-time check).
      - path: 'internal/filter/wordlist/'
        linters:
          - forbidigo
      # Streams resolver uses real time for thumbnail cache TTL.
      - path: 'internal/streams/'
        linters:
          - forbidigo
      # Markets DataSource uses real time for polling intervals.
      - path: 'internal/plugin/markets/'
        linters:
          - forbidigo
      # xbridge supervisor tracks process lifetime with real wall-clock time.
      - path: 'internal/plugin/xbridge/'
        linters:
          - forbidigo

      # virta-overlay requires platform-specific CGO (GTK/WebKit on Linux,
      # WebView2 on Windows) that is not available on all CI runners. It is
      # a deployment binary and is not part of the importable library surface.
      - path: 'cmd/virta-overlay/'
        linters:
          - typecheck
          - errcheck
          - unused
          - staticcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/elythi0n/virta
